<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vision Calc Pro - Fixed</title>
    <style>
        :root { --accent: #00ff41; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: monospace; overflow: hidden; }
        
        /* Painel de Erros/Status */
        #status-log {
            position: fixed; top: 10px; left: 10px; right: 10px;
            background: rgba(255, 0, 0, 0.2); border: 1px solid red;
            padding: 8px; font-size: 12px; z-index: 9999; display: none;
        }

        #hud {
            position: fixed; top: 0; width: 100%; height: 80px;
            background: linear-gradient(to bottom, black, transparent);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }

        .stat { text-align: center; }
        .stat small { display: block; color: var(--accent); font-size: 10px; }
        .stat span { font-size: 24px; font-weight: bold; }

        #viewport-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: auto; }

        .btn-main {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; background: var(--accent); color: black;
            border: none; font-weight: bold; cursor: pointer; z-index: 10000;
        }

        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 1000; background: rgba(0,0,0,0.8);
            padding: 10px; border-radius: 10px;
        }

        button.mode-btn {
            background: #222; border: 1px solid var(--accent); color: white;
            padding: 10px; border-radius: 5px; cursor: pointer;
        }

        button.active { background: var(--accent); color: black; }
        
        .slider-panel {
            position: fixed; right: 10px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; align-items: center;
        }
        input[type=range] { appearance: slider-vertical; width: 20px; height: 200px; }
    </style>
</head>
<body>

    <div id="status-log"></div>

    <button id="start-btn" class="btn-main" onclick="startApp()">LIGAR CÂMERA E CALCULADORA</button>

    <div id="hud">
        <div class="stat"><small>ITENS</small><span id="count-val">0</span></div>
        <div class="stat"><small>ÂNGULO</small><span id="angle-val">0°</span></div>
    </div>

    <div id="viewport-container">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="c"></canvas>
    </div>

    <div class="slider-panel">
        <small>SENSIB.</small>
        <input type="range" id="thresh" min="50" max="220" value="128">
    </div>

    <div class="controls">
        <button class="mode-btn active" id="m-count" onclick="setMode('count')">CONTAR</button>
        <button class="mode-btn" id="m-angle" onclick="setMode('angle')">ÂNGULO</button>
        <button class="mode-btn" onclick="resetPoints()">LIMPAR</button>
    </div>

    <script>
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const ctx = c.getContext('2d', { willReadFrequently: true });
        const log = document.getElementById('status-log');
        let mode = 'count';
        let points = [];

        function showError(msg) {
            log.style.display = 'block';
            log.innerHTML = `<strong>ERRO:</strong> ${msg} <br><small>Verifique se está usando HTTPS ou localhost.</small>`;
        }

        async function startApp() {
            document.getElementById('start-btn').style.display = 'none';
            
            const constraints = {
                video: { 
                    facingMode: "environment",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                v.srcObject = stream;
                v.onloadedmetadata = () => {
                    c.width = v.videoWidth;
                    c.height = v.videoHeight;
                    animate();
                };
            } catch (err) {
                showError(err.name + ": " + err.message);
            }
        }

        function setMode(m) {
            mode = m;
            document.getElementById('m-count').classList.toggle('active', m === 'count');
            document.getElementById('m-angle').classList.toggle('active', m === 'angle');
        }

        function resetPoints() { points = []; }

        c.addEventListener('click', (e) => {
            if (mode === 'angle') {
                const rect = c.getBoundingClientRect();
                points.push({
                    x: (e.clientX - rect.left) * (c.width / rect.width),
                    y: (e.clientY - rect.top) * (c.height / rect.height)
                });
                if (points.length > 3) points.shift();
            }
        });

        function animate() {
            ctx.drawImage(v, 0, 0, c.width, c.height);
            
            if (mode === 'count') {
                runVisionCount();
            } else {
                runGeometry();
            }

            requestAnimationFrame(animate);
        }

        function runVisionCount() {
            const imgData = ctx.getImageData(0, 0, c.width, c.height);
            const data = imgData.data;
            const threshold = document.getElementById('thresh').value;
            let hits = 0;

            // Processamento binário simples para detecção de massa
            for (let i = 0; i < data.length; i += 16) {
                const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                if (brightness > threshold) {
                    hits++;
                    // Feedback visual no canvas
                    data[i] = 0; data[i+1] = 255; data[i+2] = 65; 
                }
            }
            // Estimativa de blobs (objetos). Dividimos a massa de pixels por um tamanho médio de item
            const estimation = Math.floor(hits / 8); 
            document.getElementById('count-val').innerText = estimation.toLocaleString();
        }

        function runGeometry() {
            ctx.strokeStyle = '#00ff41';
            ctx.fillStyle = '#00ff41';
            ctx.lineWidth = 5;

            points.forEach((p, i) => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
                ctx.fill();
                if (i > 0) {
                    ctx.beginPath();
                    ctx.moveTo(points[i-1].x, points[i-1].y);
                    ctx.lineTo(p.x, p.y);
                    ctx.stroke();
                }
            });

            if (points.length === 3) {
                const a = Math.hypot(points[1].x - points[0].x, points[1].y - points[0].y);
                const b = Math.hypot(points[1].x - points[2].x, points[1].y - points[2].y);
                const c = Math.hypot(points[2].x - points[0].x, points[2].y - points[0].y);
                const angle = Math.acos((a*a + b*b - c*c) / (2*a*b)) * (180 / Math.PI);
                document.getElementById('angle-val').innerText = (angle || 0).toFixed(1) + "°";
            }
        }
    </script>
</body>
</html>
