<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Pro - Contagem de Precisão</title>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
    <style>
        :root { --neon: #00ff41; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        
        #hud {
            position: fixed; top: 0; width: 100%; padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex; justify-content: space-around; z-index: 100;
            border-bottom: 1px solid #333;
        }
        .display { text-align: center; }
        .display div { font-size: 10px; color: var(--neon); }
        .display span { font-size: 32px; font-weight: bold; }

        #container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }

        #controls {
            position: fixed; bottom: 30px; width: 100%;
            display: flex; justify-content: center; gap: 15px; z-index: 1000;
        }
        .btn {
            background: rgba(0,0,0,0.8); border: 2px solid var(--neon); color: var(--neon);
            padding: 15px 25px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .btn.active { background: var(--neon); color: black; }

        #loading {
            position: fixed; inset: 0; background: black; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="loading">
        <h2 id="status">INICIALIZANDO MOTOR OPENCV...</h2>
        <p>Aguarde o carregamento dos drivers de visão.</p>
    </div>

    <div id="hud">
        <div class="display">
            <div>OBJETOS DETECTADOS</div>
            <span id="count-res">0</span>
        </div>
        <div class="display">
            <div>ÂNGULO</div>
            <span id="angle-res">0°</span>
        </div>
    </div>

    <div id="container">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="c"></canvas>
    </div>

    <div id="controls">
        <button id="btn-count" class="btn active" onclick="setMode('count')">MODO CONTAGEM</button>
        <button id="btn-angle" class="btn" onclick="setMode('angle')">MODO ÂNGULO</button>
    </div>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const countRes = document.getElementById('count-res');
        const angleRes = document.getElementById('angle-res');
        let mode = 'count';
        let points = [];

        // Inicializa a câmera e o motor
        window.onload = () => {
            const checkCV = setInterval(() => {
                if (typeof cv !== 'undefined' && cv.Mat) {
                    clearInterval(checkCV);
                    document.getElementById('status').innerText = "MOTOR PRONTO!";
                    setTimeout(startCamera, 500);
                }
            }, 500);
        };

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                document.getElementById('loading').style.display = 'none';
                processVideo();
            } catch (err) {
                alert("Erro de câmera. Use HTTPS.");
            }
        }

        function setMode(m) {
            mode = m;
            document.getElementById('btn-count').className = m === 'count' ? 'btn active' : 'btn';
            document.getElementById('btn-angle').className = m === 'angle' ? 'btn active' : 'btn';
            points = [];
        }

        function processVideo() {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            let src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            let gray = new cv.Mat();
            let thresh = new cv.Mat();
            let contours = new cv.PolyVector();
            let hierarchy = new cv.Mat();

            const FPS = 30;
            function process() {
                if (video.paused || video.ended) return;
                
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                src.data.set(ctx.getImageData(0, 0, canvas.width, canvas.height).data);

                if (mode === 'count') {
                    // 1. Converter para Cinza
                    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                    // 2. Filtro de Blur para reduzir ruído
                    cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0);
                    // 3. Threshold Adaptativo (Detecta objetos independente da luz)
                    cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);
                    // 4. Encontrar Contornos (Objetos Reais)
                    cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                    let objectCount = 0;
                    for (let i = 0; i < contours.size(); ++i) {
                        let cnt = contours.get(i);
                        let area = cv.contourArea(cnt);
                        // Filtra apenas objetos com tamanho mínimo para ignorar poeira/ruído
                        if (area > 20) {
                            objectCount++;
                            let rect = cv.boundingRect(cnt);
                            ctx.strokeStyle = '#00ff41';
                            ctx.lineWidth = 2;
                            ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);
                        }
                    }
                    countRes.innerText = objectCount;
                } else {
                    renderAngle(ctx);
                }

                setTimeout(process, 1000 / FPS);
            }
            process();
        }

        // Sistema de Ângulo por Toque
        canvas.addEventListener('click', (e) => {
            if (mode !== 'angle') return;
            const rect = canvas.getBoundingClientRect();
            points.push({
                x: (e.clientX - rect.left) * (canvas.width / rect.width),
                y: (e.clientY - rect.top) * (canvas.height / rect.height)
            });
            if (points.length > 3) points.shift();
        });

        function renderAngle(ctx) {
            ctx.fillStyle = '#00ff41';
            ctx.strokeStyle = '#00ff41';
            points.forEach((p, i) => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
                ctx.fill();
                if(i > 0) {
                    ctx.beginPath();
                    ctx.moveTo(points[i-1].x, points[i-1].y);
                    ctx.lineTo(p.x, p.y);
                    ctx.stroke();
                }
            });
            if (points.length === 3) {
                const angle = calculateAngle(points[0], points[1], points[2]);
                angleRes.innerText = angle.toFixed(1) + "°";
            }
        }

        function calculateAngle(p1, p2, p3) {
            const a = Math.hypot(p2.x - p1.x, p2.y - p1.y);
            const b = Math.hypot(p2.x - p3.x, p2.y - p3.y);
            const c = Math.hypot(p3.x - p1.x, p3.y - p1.y);
            return Math.acos((a*a + b*b - c*c) / (2*a*b)) * (180 / Math.PI) || 0;
        }
    </script>
</body>
</html>
